name: APK build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: chmod +x ./gradlew

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: ./gradlew assembleDebug
